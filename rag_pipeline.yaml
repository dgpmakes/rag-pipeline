deploymentSpec:
  executors:
    exec-register-vector-store-and-files:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - register_vector_store_and_files
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'llama-stack-client==0.3.5'\
          \ 'fire' 'requests'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.15.2' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef register_vector_store_and_files(\n    git_repo: str,\n    git_context:\
          \ str,\n    git_ref: str,\n    vector_store_name: str,\n    vector_store_provider_id:\
          \ str,\n    chunk_size_in_tokens: int,\n    chunk_overlap_in_tokens: int,\n\
          \    embedding_model: str,\n    embedding_dimension: int,\n    ranker: str,\n\
          \    filenames: str,\n):\n    import io\n    import os\n    import requests\n\
          \    from typing import List, Optional\n    from llama_stack_client import\
          \ LlamaStackClient\n    from llama_stack_client.types.model import Model\n\
          \    from llama_stack_client.types.vector_store import VectorStore\n\n \
          \   # Validate parameters\n    if not vector_store_name:\n        raise\
          \ ValueError(\"VECTOR_STORE_NAME parameter must be set\")\n    if not vector_store_provider_id:\n\
          \        raise ValueError(\"VECTOR_STORE_PROVIDER_ID parameter must be set\"\
          )\n    if not git_repo:\n        raise ValueError(\"GIT_REPO parameter must\
          \ be set\")\n    if not git_context:\n        raise ValueError(\"GIT_CONTEXT\
          \ parameter must be set\")\n    if not git_ref:\n        raise ValueError(\"\
          GIT_REF parameter must be set\")\n    if not filenames:\n        raise ValueError(\"\
          FILENAMES parameter must be set\")\n    if not chunk_size_in_tokens:\n \
          \       raise ValueError(\"CHUNK_SIZE_IN_TOKENS parameter must be set\"\
          )\n    if not chunk_overlap_in_tokens:\n        raise ValueError(\"CHUNK_OVERLAP_IN_TOKENS\
          \ parameter must be set\")\n    if not embedding_model:\n        raise ValueError(\"\
          EMBEDDING_MODEL parameter must be set\")\n    if not embedding_dimension:\n\
          \        raise ValueError(\"EMBEDDING_DIMENSION parameter must be set\"\
          )\n    if not ranker:\n        raise ValueError(\"RANKER parameter must\
          \ be set\")\n\n    # Read environment variables\n    llama_stack_host: str\
          \ = os.environ.get(\"LLAMA_STACK_HOST\")\n    llama_stack_port: int = os.environ.get(\"\
          LLAMA_STACK_PORT\")\n    llama_stack_secure: bool = os.environ.get(\"LLAMA_STACK_SECURE\"\
          , \"\").lower() in (\"true\", \"1\", \"yes\")\n\n    print(f\"LLAMA_STACK_HOST:\
          \ {llama_stack_host}\")\n    print(f\"LLAMA_STACK_PORT: {llama_stack_port}\"\
          )\n    print(f\"LLAMA_STACK_SECURE: {llama_stack_secure}\")\n    print(f\"\
          LLAMA_STACK_BASE_URL: {'https' if llama_stack_secure else 'http'}://{llama_stack_host}:{llama_stack_port}\"\
          )\n\n    # Validate environment variables\n    if not llama_stack_host:\n\
          \        raise ValueError(\"LLAMA_STACK_HOST environment variable must be\
          \ set\")\n    if not llama_stack_port:\n        raise ValueError(\"LLAMA_STACK_PORT\
          \ environment variable must be set\")\n    if os.environ.get(\"LLAMA_STACK_SECURE\"\
          ) is None:\n        raise ValueError(\"LLAMA_STACK_SECURE environment variable\
          \ must be set\")\n\n    # Initialize client\n    client: LlamaStackClient\
          \ = LlamaStackClient(base_url=f\"{'https' if llama_stack_secure else 'http'}://{llama_stack_host}:{llama_stack_port}\"\
          )\n\n    # Base raw URL for the git repository\n    base_raw_url: str =\
          \ f\"https://raw.githubusercontent.com/{git_repo}/{git_ref}/{git_context}\"\
          \n\n    # Upload all files first and collect file_ids\n    file_ids: List[str]\
          \ = []\n    for filename in filenames.split(\",\"):\n        source = f\"\
          {base_raw_url}/{filename.strip()}\"\n        print(\"Downloading and uploading\
          \ document:\", source)\n\n        try:\n            # Download the docs\
          \ from URL\n            response = requests.get(source)\n            response.raise_for_status()\
          \  # Raise an exception for bad status codes\n\n            file_content\
          \ = io.BytesIO(response.content)\n            file_basename = source.split(\"\
          /\")[-1]\n\n            print(f\"Uploading file: {file_basename} to {client.base_url}\"\
          )\n\n            # Upload file to storage\n            file = client.files.create(\n\
          \                file=(file_basename, file_content, \"application/pdf\"\
          ),\n                purpose=\"assistants\",\n            )\n           \
          \ file_ids.append(file.id)\n            print(f\"Successfully uploaded {file_basename}\
          \ (file_id: {file.id})\")\n\n        except Exception as e:\n          \
          \  print(f\"ERROR: Failed to upload {filename.strip()}: {str(e)}\")\n  \
          \          raise\n\n    print(f\"Successfully uploaded {len(file_ids)} files:\
          \ {file_ids}\")\n\n    models: List[Model] = client.models.list()\n    #\
          \ TODO: In 0.4.2, the model.id is the identifier, but in 0.3.5, the model.id\
          \ is the identifier\n    matching_model: Optional[Model] = next((m for m\
          \ in models if m.identifier == embedding_model), None)\n\n    if not matching_model:\n\
          \        available = [m.identifier for m in models]\n        raise ValueError(\n\
          \            f\"Model '{embedding_model}' not found. Available: {available}\"\
          \n        )\n\n    # TODO: In 0.4.2, the model.api_model_type is the model\
          \ type, but in 0.3.5, the model.api_model_type is the model type\n    #\
          \ model_type = (\n    #     matching_model.custom_metadata.get(\"model_type\"\
          )\n    #     if matching_model.custom_metadata\n    #     else None\n  \
          \  # )\n    model_type = matching_model.api_model_type\n    print(f\"Matching\
          \ model: {matching_model}\")\n    print(f\"Model type: {model_type}\")\n\
          \n    if model_type != \"embedding\":\n        raise ValueError(\n     \
          \       f\"Model '{embedding_model}' is not an embedding model (type={model_type})\"\
          \n        )\n\n    embedding_dimension = int(\n        # TODO: In 0.4.2,\
          \ the model.custom_metadata.get(\"embedding_dimension\") is the embedding\
          \ dimension, but in 0.3.5, the model.metadata.get(\"embedding_dimension\"\
          ) is the embedding dimension\n        #float(matching_model.custom_metadata.get(\"\
          embedding_dimension\"))\n        float(matching_model.metadata.get(\"embedding_dimension\"\
          ))\n    )\n\n    # Warm up the embedding model\n    client.embeddings.create(\n\
          \        model=embedding_model,\n        input=\"warmup\",\n    )\n\n  \
          \  # Create empty vector store first, before inserting files.\n    # Purpose:\
          \ Depending on the size and number of files, attempting to create the vector\
          \ store\n    # and add files in a single step may lead to timeouts.\n  \
          \  try:\n        vector_store: VectorStore = client.vector_stores.create(\n\
          \            name=vector_store_name,\n            file_ids=[],\n       \
          \     chunking_strategy={\n                \"type\": \"static\",\n     \
          \           \"static\": {\n                    \"max_chunk_size_tokens\"\
          : chunk_size_in_tokens,\n                    \"chunk_overlap_tokens\": chunk_overlap_in_tokens,\n\
          \                },\n            },\n            extra_body={\n        \
          \        \"embedding_model\": embedding_model,\n                \"embedding_dimension\"\
          : embedding_dimension,\n                \"provider_id\": vector_store_provider_id,\n\
          \            }\n        )\n        print(f\"Successfully created vector\
          \ store '{vector_store_name}' with ID: {vector_store.id}\")\n    except\
          \ Exception as e:\n        print(f\"ERROR: Failed to create vector store\
          \ '{vector_store_name}': {str(e)}\")\n        raise Exception(f\"ERROR:\
          \ Failed to create vector store '{vector_store_name}': {str(e)}\")\n\n \
          \   # Add files to vector store\n    try:\n        for file_id in file_ids:\n\
          \            print(f\"Adding file_id '{file_id}' to vector store '{vector_store_name}'\"\
          )\n            client.vector_stores.files.create(\n                vector_store_id=vector_store.id,\n\
          \                file_id=file_id,\n            )\n        vector_store:\
          \ VectorStore = client.vector_stores.retrieve(vector_store.id)\n       \
          \ print(f\"Vector store details: {vector_store}\")\n    except Exception\
          \ as e:\n        print(f\"WARNING: Some files failed to be added to vector\
          \ store: {str(e)}\")\n\n"
        image: quay.io/modh/odh-pipeline-runtime-pytorch-cuda-py312-ubi9@sha256:72ff2381e5cb24d6f549534cb74309ed30e92c1ca80214669adb78ad30c5ae12
